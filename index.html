<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定语从句：关系词逻辑匹配</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        html, body {
            height: 100%;
            overflow: hidden; /* 手机端禁止整体滑动 */
        }
        body {
            background-color: #f5f7fa;
            padding: 8px;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            padding: 4px 0;
        }
        .subtitle {
            text-align: center;
            color: #5a6a7a;
            font-size: clamp(0.75rem, 3vw, 0.9rem);
            padding-bottom: 4px;
        }
        .tags {
            text-align: center;
            padding-bottom: 6px;
        }
        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .tag.blue {
            background-color: #e3f2fd;
            color: #1976d2;
        }
        /* 核心游戏区域：占满剩余屏幕，弹性布局 */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
        }
        /* 平板/PC布局：恢复横向，解除溢出隐藏 */
        @media (min-width: 768px) {
            .game-area {
                flex-direction: row;
                gap: 15px;
            }
            html, body {
                overflow: auto;
            }
        }

        /* 左侧词汇区 */
        .word-list {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .word-list h3 {
            color: #2c3e50;
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            padding-left: 6px;
            border-left: 3px solid #6366f1;
            margin-bottom: 6px;
        }
        .word-item {
            padding: 8px 10px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: grab;
            display: none;
            justify-content: space-between;
            align-items: center;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
        }
        .word-item.active {
            display: flex;
        }
        .complete-tip {
            text-align: center;
            color: #22c55e;
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            font-weight: 500;
        }

        /* 右侧主区域：分类 + 从句生成器【核心占比调整】 */
        .drop-zones {
            flex: 1;
            display: grid;
            /* 手机端：4个方框占比缩小，从句生成器占比放大 */
            grid-template-rows: 1fr 1fr 2fr;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        /* 平板/PC端恢复原占比，保证方框舒适大小 */
        @media (min-width: 768px) {
            .drop-zones {
                grid-template-rows: 1fr 1fr auto;
            }
        }
        /* 4个关系词方框：手机端缩小内边距/高度，保留拖拽区域 */
        .drop-zone {
            background: white;
            padding: 4px 8px; /* 大幅减小内边距 */
            border-radius: 10px;
            border: 2px dashed #cbd5e1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            min-height: 60px; /* 手机端最小高度降低 */
        }
        /* 平板/PC端恢复方框内边距和高度 */
        @media (min-width: 768px) {
            .drop-zone {
                padding: 8px;
                min-height: 80px;
            }
        }
        .drop-zone.drag-over {
            border-color: #6366f1;
            background-color: #f0f4ff;
        }
        .drop-zone h4 {
            color: #64748b;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            margin-bottom: 2px; /* 减小标题间距 */
        }
        .drop-zone .rel-word {
            font-size: clamp(0.95rem, 4vw, 1.3rem);
            font-weight: bold;
        }
        .drop-zone.people .rel-word { color: #2563eb; }
        .drop-zone.thing .rel-word { color: #16a34a; }
        .drop-zone.time .rel-word { color: #d97706; } /* 修复原颜色笔误 */
        .drop-zone.place .rel-word { color: #9333ea; }

        /* 从句生成器：手机端放大占比、增加内边距，提升可视性 */
        .result-area {
            grid-column: 1 / -1;
            background-color: #1e293b;
            color: white;
            padding: 15px 12px; /* 增加内边距，放大显示区域 */
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }
        .result-area h3 {
            color: #94a3b8;
            font-size: clamp(0.85rem, 3vw, 1rem);
            margin-bottom: 8px; /* 增加标题间距 */
        }
        .result-text {
            color: #cbd5e1;
            font-size: clamp(0.95rem, 3.5vw, 1.1rem); /* 放大字体 */
            line-height: 1.6; /* 增加行高，方便阅读 */
            word-break: break-all; /* 防止英文句子溢出 */
        }
        .highlight {
            font-weight: bold;
            background-color: #fde047;
            color: #0f172a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 1.05em; /* 高亮词略放大，更醒目 */
        }

        /* 提示框：微调大小，保证手机端醒目 */
        .feedback-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 24px;
            border-radius: 10px;
            font-size: clamp(1.1rem, 5vw, 1.6rem);
            font-weight: bold;
            color: white;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
            min-width: 70%;
            max-width: 320px;
        }
        .feedback-box.success {
            background-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }
        .feedback-box.error {
            background-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }
        .feedback-box.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>定语从句：关系词逻辑匹配</h1>
        <p class="subtitle">根据先行词属性，拖拽词汇到对应关系词区域</p>
        <div class="tags">
            <span class="tag blue">先行词决定关系词 | 逐题作答</span>
        </div>

        <div class="game-area">
            <div class="word-list">
                <h3>待分类词汇</h3>
                <div class="word-item active" draggable="true" data-category="thing" data-word="Dim Sum (点心)">
                    Dim Sum (点心) <span>=</span>
                </div>
                <div class="word-item" draggable="true" data-category="people" data-word="Confucius (孔子)">Confucius (孔子)</div>
                <div class="word-item" draggable="true" data-category="thing" data-word="Peking Opera (京剧)">Peking Opera (京剧)</div>
                <div class="word-item" draggable="true" data-category="place" data-word="Ancient Silk Road (丝绸之路)">丝绸之路</div>
                <div class="word-item" draggable="true" data-category="time" data-word="Mid-Autumn Festival (中秋节)">中秋节</div>
                <div class="word-item" draggable="true" data-category="people" data-word="Yao Ming (姚明)">Yao Ming (姚明)</div>
                <div class="word-item" draggable="true" data-category="time" data-word="Spring Festival (春节)">春节</div>
                <div class="word-item" draggable="true" data-category="place" data-word="The Forbidden City (故宫)">故宫</div>
                <div class="complete-tip" id="completeTip" style="display: none;">🎉 全部完成！</div>
            </div>

            <div class="drop-zones">
                <div class="drop-zone people" data-category="people">
                    <h4>指代：人</h4>
                    <div class="rel-word">who / that</div>
                </div>
                <div class="drop-zone thing" data-category="thing">
                    <h4>指代：物</h4>
                    <div class="rel-word">which / that</div>
                </div>
                <div class="drop-zone time" data-category="time">
                    <h4>指代：时间</h4>
                    <div class="rel-word">when</div>
                </div>
                <div class="drop-zone place" data-category="place">
                    <h4>指代：地点</h4>
                    <div class="rel-word">where</div>
                </div>
                <div class="result-area">
                    <h3>从句生成器</h3>
                    <div class="result-text">将词汇拖入上方区域查看句子</div>
                </div>
            </div>
        </div>
    </div>

    <div class="feedback-box" id="feedbackBox"></div>

    <script>
        const sentenceTemplates = {
            people: {
                "Confucius (孔子)": "Confucius is a great thinker who has influenced Chinese culture for thousands of years.",
                "Yao Ming (姚明)": "Yao Ming is a famous basketball player who is well-known around the world."
            },
            thing: {
                "Dim Sum (点心)": "Dim Sum is a traditional Cantonese snack which is popular in southern China.",
                "Peking Opera (京剧)": "Peking Opera is a unique Chinese art form that combines singing and acting."
            },
            time: {
                "Mid-Autumn Festival (中秋节)": "Mid-Autumn Festival is a festival when families eat mooncakes together.",
                "Spring Festival (春节)": "Spring Festival is the most important festival when people celebrate the Lunar New Year."
            },
            place: {
                "Ancient Silk Road (丝绸之路)": "The Ancient Silk Road is a historic route where Eastern and Western cultures met.",
                "The Forbidden City (故宫)": "The Forbidden City is a magnificent palace where Chinese emperors once lived."
            }
        };

        const wordItems = document.querySelectorAll('.word-item');
        const dropZones = document.querySelectorAll('.drop-zone');
        const resultText = document.querySelector('.result-text');
        const feedbackBox = document.getElementById('feedbackBox');
        const completeTip = document.getElementById('completeTip');
        let draggedItem = null;

        // 提示框显示函数
        function showFeedback(message, isSuccess) {
            feedbackBox.textContent = message;
            feedbackBox.className = `feedback-box ${isSuccess ? 'success' : 'error'}`;
            feedbackBox.classList.add('show');
            setTimeout(() => feedbackBox.classList.remove('show'), 1800);
        }

        // 关系词高亮函数
        function highlightRelativeWord(sentence) {
            const words = ['who','that','which','when','where'];
            let res = sentence;
            words.forEach(w => res = res.replace(new RegExp(`(${w})`,'g'),'<span class="highlight">$1</span>'));
            return res;
        }

        // 加载下一个词汇函数
        function loadNextWord() {
            const curr = document.querySelector('.word-item.active');
            if(!curr) return;
            curr.classList.remove('active');
            const next = curr.nextElementSibling;
            if(next && next.classList.contains('word-item')) next.classList.add('active');
            else {
                completeTip.style.display = 'block';
                resultText.innerHTML = '<span style="color:#22c55e; font-size:1.1em;">✅ 所有定语从句匹配完成，恭喜你！</span>';
            }
        }

        // 拖拽事件绑定
        wordItems.forEach(item => {
            item.addEventListener('dragstart', e => {
                if(e.target.classList.contains('active')) {
                    draggedItem = e.target;
                    e.dataTransfer.setData('text', e.target.dataset.word);
                    e.target.style.opacity = '0.5';
                } else e.preventDefault();
            });
            item.addEventListener('dragend', e => {
                if(draggedItem) e.target.style.opacity = '1';
                draggedItem = null;
            });
        });

        // 拖拽区域事件绑定
        dropZones.forEach(zone => {
            zone.addEventListener('dragover', e => {e.preventDefault(); zone.classList.add('drag-over');});
            zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                if(!draggedItem) return;

                const word = e.dataTransfer.getData('text');
                const cat1 = draggedItem.dataset.category;
                const cat2 = zone.dataset.category;

                if(cat1 === cat2) {
                    const s = sentenceTemplates[cat1][word];
                    resultText.innerHTML = highlightRelativeWord(s);
                    showFeedback('Excellent!', true);
                    loadNextWord();
                } else {
                    resultText.textContent = '❌ 匹配错误，请将词汇拖入对应区域重试！';
                    showFeedback('再试一次！', false);
                }
            });
        });
    </script>
</body>
</html>
